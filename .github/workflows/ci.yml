name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  simulate:
    runs-on: ubuntu-24.04
    env:
      DOCKER_IMAGE: verilaxi-ci
      CI_OBJ_DIR: work/obj_dir_ci

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $DOCKER_IMAGE .

      - name: Tool versions
        run: |
          docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE \
            bash -lc "verilator --version && yosys -V"

      # ── AXI-Stream register ────────────────────────────────────────────────
      - name: axis_register  (no backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_register SRC_BP=0 SINK_BP=0

      - name: axis_register  (full backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_register SRC_BP=1 SINK_BP=1

      # ── AXI-Stream arbiter ────────────────────────────────────────────────
      - name: axis_arbiter  (no backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_arbiter SRC_BP=0 SINK_BP=0

      - name: axis_arbiter  (full backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_arbiter SRC_BP=1 SINK_BP=1

      - name: axis_arbiter_beat (no backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_arbiter_beat SRC_BP=0 SINK_BP=0

      - name: axis_arbiter_beat (full backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_arbiter_beat SRC_BP=1 SINK_BP=1

      - name: axis_arbiter_weighted (no backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_arbiter_weighted SRC_BP=0 SINK_BP=0

      - name: axis_arbiter_weighted (full backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_arbiter_weighted SRC_BP=1 SINK_BP=1

      # ── AXI-Stream width converters ──────────────────────────────────────
      - name: axis_upsizer (no backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_upsizer SRC_BP=0 SINK_BP=0

      - name: axis_upsizer (full backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_upsizer SRC_BP=1 SINK_BP=1

      - name: axis_downsizer (no backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_downsizer SRC_BP=0 SINK_BP=0

      - name: axis_downsizer (full backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_downsizer SRC_BP=1 SINK_BP=1

      - name: axis_rr_converter (no backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_rr_converter SRC_BP=0 SINK_BP=0

      - name: axis_rr_converter (full backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_rr_converter SRC_BP=1 SINK_BP=1

      - name: axis_rr_upsizer (no backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_rr_upsizer SRC_BP=0 SINK_BP=0

      - name: axis_rr_upsizer (full backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_rr_upsizer SRC_BP=1 SINK_BP=1

      - name: axis_rr_downsizer (no backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_rr_downsizer SRC_BP=0 SINK_BP=0

      - name: axis_rr_downsizer (full backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_rr_downsizer SRC_BP=1 SINK_BP=1

      # ── AXI-Stream FIFO ───────────────────────────────────────────────────
      - name: axis_fifo  (streaming, no backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_fifo FRAME_FIFO=0 SRC_BP=0 SINK_BP=0

      - name: axis_fifo  (streaming, full backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_fifo FRAME_FIFO=0 SRC_BP=1 SINK_BP=1

      - name: axis_fifo  (frame mode, no backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_fifo FRAME_FIFO=1 SRC_BP=0 SINK_BP=0

      - name: axis_fifo  (frame mode, full backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_fifo FRAME_FIFO=1 SRC_BP=1 SINK_BP=1

      # ── AXI-Stream Async FIFO ────────────────────────────────────────────
      - name: axis_afifo  (streaming, TESTTYPE=1, no backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_afifo FRAME_FIFO=0 TESTTYPE=1 SRC_BP=0 SINK_BP=0

      - name: axis_afifo  (streaming, TESTTYPE=1, full backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_afifo FRAME_FIFO=0 TESTTYPE=1 SRC_BP=1 SINK_BP=1

      - name: axis_afifo  (streaming, TESTTYPE=2, full backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_afifo FRAME_FIFO=0 TESTTYPE=2 SRC_BP=1 SINK_BP=1

      - name: axis_afifo  (frame mode, TESTTYPE=1, full backpressure)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axis_afifo FRAME_FIFO=1 TESTTYPE=1 SRC_BP=1 SINK_BP=1

      # ── AXI-Lite register ─────────────────────────────────────────────────
      - name: axil_register
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=axil_register

      # ── AXI DMA ───────────────────────────────────────────────────────────
      - name: dma  (TESTTYPE=0 write abort)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=dma TESTTYPE=0

      - name: dma  (TESTTYPE=0 write abort, READY_PROB=80)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=dma TESTTYPE=0 READY_PROB=80

      - name: dma  (TESTTYPE=2 four frames, READY_PROB=50)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=dma TESTTYPE=2 READY_PROB=50

      - name: dma  (TESTTYPE=3 4KB boundary, READY_PROB=70)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=dma TESTTYPE=3 READY_PROB=70

      - name: dma  (TESTTYPE=4 circular, READY_PROB=100)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=dma TESTTYPE=4

      - name: dma  (TESTTYPE=4 circular, READY_PROB=80)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=dma TESTTYPE=4 READY_PROB=80

      # ── AXI CDMA ──────────────────────────────────────────────────────────
      - name: cdma  (TESTTYPE=1 4KB boundary, READY_PROB=100)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=cdma TESTTYPE=1

      - name: cdma  (TESTTYPE=2 four frames, READY_PROB=70)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=cdma TESTTYPE=2 READY_PROB=70

      - name: cdma  (TESTTYPE=0 basic aligned, READY_PROB=50)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make clean run OBJ_DIR=$CI_OBJ_DIR TESTNAME=cdma TESTTYPE=0 READY_PROB=50

      # ── Synthesis (Yosys) ─────────────────────────────────────────────────
      - name: synth-all (generic)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make synth-all SYNTH_TARGET=generic

      - name: synth-all (artix7)
        run: docker run --rm -v "$PWD":/workspace -w /workspace $DOCKER_IMAGE make synth-all SYNTH_TARGET=artix7

      # ── Upload logs on failure ────────────────────────────────────────────
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: work/
          if-no-files-found: ignore
